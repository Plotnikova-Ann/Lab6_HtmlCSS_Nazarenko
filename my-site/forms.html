<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формы - История ЭВМ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Различные типы input</h1>
    </header>
    
    <nav>
        <a href="index.html">Главная</a> |
        <a href="media.html">Медиа</a> |
        <a href="forms.html">Формы</a> |
        <a href="vector.html">SVG</a>
    </nav>
    
    <main>
        <section>
            <h2>Регистрация</h2>
            
            <form>
                <fieldset>
                    <legend>Личные данные</legend>
                    
                    <p>
                        <label>Имя пользователя:</label>
                        <input type="text" placeholder="Введите имя">
                    </p>
                    
                    <p>
                        <label>Телефон:</label>
                        <input type="tel" placeholder="+7 (___) ___-__-__">
                    </p>
                    
                    <p>
                        <label>Email:</label>
                        <input type="email" placeholder="example@mail.com">
                    </p>
                    
                    <p>
                        <label>Пароль:</label>
                        <input type="password" placeholder="Введите пароль">
                    </p>
                    
                    <p>
                        <label>Сайт:</label>
                        <input type="url" placeholder="https://example.com">
                    </p>
                    
                    <p>
                        <label>Поиск:</label>
                        <input type="search" placeholder="Поиск...">
                    </p>
                    
                    <p>
                        <label>Возраст:</label>
                        <input type="number" min="0" max="120" value="18">
                    </p>
                    
                    <p>
                        <label>Дата рождения:</label>
                        <input type="date">
                    </p>
                    
                    <p>
                        <label>Пол:</label>
                        <select>
                            <option>Мужской</option>
                            <option>Женский</option>
                        </select>
                    </p>
                    
                    <p>
                        <label>
                            <input type="checkbox"> Я согласен с условиями
                        </label>
                    </p>
                    
                    <p>
                        <button type="submit" class="btn-primary">Отправить</button>
                        <button type="reset">Очистить</button>
                    </p>
                </fieldset>
            </form>
        </section>
        
        <aside>
            <h3>О формах</h3>
            <p>Формы используются для сбора данных от пользователей.</p>
            <p>Разные типы input помогают валидировать данные прямо в браузере.</p>
        </aside>
    </main>
    
    <footer>
        <a href="index.html">← Назад на главную</a>
        <p> 2025 | Назаренко Анна | ИС-232</p>
    </footer>
</body>
</html>
